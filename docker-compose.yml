services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/bustaTv.db
      - SECRET_API_KEY=bustatv-dev-secret-key-changeme
    volumes:
      - ./backend:/app/backend
      - bustav_db:/app/data
    networks:
      - bustav_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://${SERVER_IP:-localhost}:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - bustav_network

volumes:
  bustav_db:
    driver: local

networks:
  bustav_network:
    driver: bridge
